# Deterministic suppression rules — applied BEFORE the validator.
# Every match is logged to security-scan-report/suppressions.log with the rule id.

rules:
  - id: test-sources
    reason: "Test code is not in the production attack surface"
    path_globs:
      # Java
      - "**/src/test/**"
      - "**/src/*Test/**"         # Gradle variants
      - "**/test/java/**"
      - "**/*Test.java"
      - "**/*IT.java"
      - "**/*Tests.java"
      - "**/*IntegrationTest.java"
      # Node / TS
      - "**/__tests__/**"
      - "**/*.test.{js,ts,jsx,tsx,mjs,cjs}"
      - "**/*.spec.{js,ts,jsx,tsx,mjs,cjs}"
      - "**/test/**/*.{js,ts}"
      - "**/tests/**/*.{js,ts}"
      - "**/e2e/**"
      - "**/cypress/**"
      - "**/playwright/**"
      # Python
      - "**/test_*.py"
      - "**/*_test.py"
      - "**/tests/**/*.py"
      - "**/test/**/*.py"
      - "**/conftest.py"

  - id: generated-sources
    reason: "Generated code is regenerated from source of truth; fixes belong upstream"
    path_globs:
      # Java
      - "**/target/generated-sources/**"
      - "**/target/generated-test-sources/**"
      - "**/build/generated/**"
      - "**/build/generated-src/**"
      - "**/.apt_generated/**"
      # Node / TS
      - "**/dist/**"
      - "**/build/**"
      - "**/.next/**"
      - "**/out/**"
      - "**/*.min.js"
      - "**/*.bundle.js"
      # Python
      - "**/*_pb2.py"
      - "**/*_pb2_grpc.py"
    # Additionally suppress if first 50 lines contain a generator header:
    header_markers:
      - "DO NOT EDIT"
      - "This file was automatically generated"
      - "Generated by"
      - "@generated"

  - id: vendored
    reason: "Third-party code — fix by upgrading the dependency, not by patching"
    path_globs:
      - "**/node_modules/**"
      - "**/vendor/**"
      - "**/third_party/**"
      - "**/.venv/**"
      - "**/venv/**"
      - "**/env/**"
      - "**/site-packages/**"
      - "**/__pycache__/**"
      - "**/.tox/**"
      - "**/.mypy_cache/**"
      - "**/.pytest_cache/**"

  - id: build-artifacts
    reason: "Build output, not source"
    path_globs:
      - "**/target/classes/**"
      - "**/build/classes/**"
      - "**/out/**"
      - "**/*.pyc"
      - "**/*.pyo"

  - id: scan-output
    reason: "The security-scan skill's own output directory — self-reference causes FPs (e.g., Semgrep matching CVE descriptions inside the report)"
    path_globs:
      - "**/security-scan-report/**"
      - "**/.security-scan-cache/**"

  - id: iac-examples-and-modules
    reason: "Example/module/fixture IaC that does not ship to production"
    path_globs:
      - "**/examples/**/*.tf"
      - "**/examples/**/Chart.yaml"
      - "**/modules/*/examples/**"
      - "**/fixtures/**"
      - "**/test-fixtures/**"
      # Helm chart templates with `# SECURITY: example-only` markers also fall here
    header_markers:
      - "SECURITY: example-only"
      - "# NOT FOR PRODUCTION"

  - id: iac-local-dev
    reason: "Compose files and local-dev overlays are not production surface"
    path_globs:
      - "**/docker-compose.override.yml"
      - "**/docker-compose.dev.yml"
      - "**/docker-compose.local.yml"
      - "**/k8s/overlays/local/**"
      - "**/k8s/overlays/dev/**"
      - "**/envs/local/**"
      - "**/envs/dev/**"
    # Do NOT suppress staging/prod overlays
    never_match:
      - "**/envs/prod/**"
      - "**/envs/staging/**"
      - "**/k8s/overlays/prod/**"

  - id: sample-or-example-code
    reason: "Example code under examples/ or samples/ folders is not shipped"
    path_globs:
      - "**/examples/**"
      - "**/samples/**"
    # Opt out by adding an entry in .security-scan-baseline.json

  # User-maintained baseline file — explicit acknowledgements of accepted risk.
  # Format: { "fingerprints": ["sha256:..."], "notes": { "sha256:...": "why accepted" } }
  - id: baseline
    reason: "Explicitly accepted in .security-scan-baseline.json"
    baseline_file: ".security-scan-baseline.json"

# Flag to disable ALL suppressions for an audit run
no_suppress_flag: "--no-suppress"
