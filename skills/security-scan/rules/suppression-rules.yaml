# Deterministic suppression rules — applied BEFORE the validator.
# Every match is logged to security-scan-report/suppressions.log with the rule id.

rules:
  - id: test-sources
    reason: "Test code is not in the production attack surface"
    path_globs:
      - "**/src/test/**"
      - "**/src/*Test/**"         # Gradle variants
      - "**/test/java/**"
      - "**/*Test.java"
      - "**/*IT.java"
      - "**/*Tests.java"
      - "**/*IntegrationTest.java"

  - id: generated-sources
    reason: "Generated code is regenerated from source of truth; fixes belong upstream"
    path_globs:
      - "**/target/generated-sources/**"
      - "**/target/generated-test-sources/**"
      - "**/build/generated/**"
      - "**/build/generated-src/**"
      - "**/.apt_generated/**"
    # Additionally suppress if first 50 lines contain a generator header:
    header_markers:
      - "DO NOT EDIT"
      - "This file was automatically generated"
      - "Generated by"

  - id: vendored
    reason: "Third-party code — fix by upgrading the dependency, not by patching"
    path_globs:
      - "**/node_modules/**"
      - "**/vendor/**"
      - "**/third_party/**"

  - id: build-artifacts
    reason: "Build output, not source"
    path_globs:
      - "**/target/classes/**"
      - "**/build/classes/**"
      - "**/out/**"

  - id: sample-or-example-code
    reason: "Example code under examples/ or samples/ folders is not shipped"
    path_globs:
      - "**/examples/**"
      - "**/samples/**"
    # Opt out by adding an entry in .security-scan-baseline.json

  # User-maintained baseline file — explicit acknowledgements of accepted risk.
  # Format: { "fingerprints": ["sha256:..."], "notes": { "sha256:...": "why accepted" } }
  - id: baseline
    reason: "Explicitly accepted in .security-scan-baseline.json"
    baseline_file: ".security-scan-baseline.json"

# Flag to disable ALL suppressions for an audit run
no_suppress_flag: "--no-suppress"
